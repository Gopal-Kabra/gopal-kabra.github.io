<svg viewBox="0 0 720 366" width="720" height="366" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="chartTitle chartDesc">
  <title id="chartTitle">Isolation Forest vs. XGBoost baseline, Railway Predictive Maintenance</title>
  <desc id="chartDesc">Isolation Forest detected 2 of 2 failures in the test period with at least 48 hours of advance warning. The supervised XGBoost baseline detected 1 of 2 failures with about 24 hours of lead time.</desc>

  <line x1="0" y1="6" x2="720" y2="6" stroke="#DDD7CC" stroke-width="1.5"/>
  <line x1="0" y1="354" x2="720" y2="354" stroke="#DDD7CC" stroke-width="1.5"/>

  <text x="32" y="32" font-family="'IBM Plex Mono', ui-monospace, 'Cascadia Mono', Consolas, monospace" font-size="13" font-weight="600" letter-spacing="0.5" fill="#6B6259">ISOLATION FOREST VS. XGBOOST BASELINE</text>
  <text x="32" y="50" font-family="'IBM Plex Mono', ui-monospace, 'Cascadia Mono', Consolas, monospace" font-size="11" fill="#6B6259">RAILWAY PREDICTIVE MAINTENANCE &#183; TEST-PERIOD RESULTS</text>

  <text x="32" y="82" font-family="'IBM Plex Mono', ui-monospace, 'Cascadia Mono', Consolas, monospace" font-size="11" font-weight="600" letter-spacing="0.6" fill="#6B6259">FAILURES DETECTED (OF 2 TEST EVENTS)</text>

  <text x="32" y="106" font-family="'IBM Plex Sans', -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#262220">Isolation Forest</text>
  <text x="688" y="106" text-anchor="end" font-family="'IBM Plex Mono', ui-monospace, 'Cascadia Mono', Consolas, monospace" font-size="15" font-weight="600" fill="#8C4A34">2 / 2</text>
  <rect x="32" y="114" width="656" height="18" rx="2" fill="#8C4A34"/>

  <text x="32" y="156" font-family="'IBM Plex Sans', -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#262220">XGBoost baseline</text>
  <text x="688" y="156" text-anchor="end" font-family="'IBM Plex Mono', ui-monospace, 'Cascadia Mono', Consolas, monospace" font-size="15" font-weight="600" fill="#262220">1 / 2</text>
  <rect x="32" y="164" width="328" height="18" rx="2" fill="#DDD7CC"/>

  <text x="32" y="200" font-family="'IBM Plex Mono', ui-monospace, 'Cascadia Mono', Consolas, monospace" font-size="11" font-weight="600" letter-spacing="0.6" fill="#6B6259">ADVANCE WARNING BEFORE FAILURE</text>

  <text x="32" y="224" font-family="'IBM Plex Sans', -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#262220">Isolation Forest</text>
  <text x="688" y="224" text-anchor="end" font-family="'IBM Plex Mono', ui-monospace, 'Cascadia Mono', Consolas, monospace" font-size="15" font-weight="600" fill="#8C4A34">&#8805; 48h</text>
  <rect x="32" y="232" width="656" height="18" rx="2" fill="#8C4A34"/>

  <text x="32" y="274" font-family="'IBM Plex Sans', -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#262220">XGBoost baseline</text>
  <text x="688" y="274" text-anchor="end" font-family="'IBM Plex Mono', ui-monospace, 'Cascadia Mono', Consolas, monospace" font-size="15" font-weight="600" fill="#262220">~ 24h</text>
  <rect x="32" y="282" width="328" height="18" rx="2" fill="#DDD7CC"/>

  <rect x="32" y="316" width="10" height="10" fill="#8C4A34"/>
  <text x="48" y="325" font-family="'IBM Plex Sans', -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#6B6259">This project (Isolation Forest)</text>
  <rect x="270" y="316" width="10" height="10" fill="#DDD7CC"/>
  <text x="286" y="325" font-family="'IBM Plex Sans', -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#6B6259">Supervised baseline (XGBoost)</text>
</svg>
